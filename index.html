<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AS 사내테스트 피드백 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --surface2: #1c2030;
    --border: #252a3a;
    --accent-red: #ff4560;
    --accent-blue: #3b82f6;
    --accent-green: #10b981;
    --accent-yellow: #f59e0b;
    --accent-purple: #8b5cf6;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; min-height:100vh; padding:0 16px 24px; }

  /* 틀 고정 영역 */
  #stickyTop {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    padding: 20px 0 12px;
    margin: 0 -16px;
    padding-left: 16px;
    padding-right: 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }

  .header { display:flex; flex-direction:column; gap:6px; margin-bottom:10px; border-left:3px solid var(--accent-blue); padding-left:16px; }
  .header-tag { font-family:'Space Mono',monospace; font-size:10px; color:var(--accent-blue); letter-spacing:2px; text-transform:uppercase; }
  .header h1 { font-size:20px; font-weight:700; }
  .header .subtitle { font-size:12px; color:var(--text-muted); }
  .last-updated { font-family:'Space Mono',monospace; font-size:10px; color:var(--accent-green); margin-top:4px; }

  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
  .grid-1 { margin-bottom:12px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; }
  .card-title { font-size:10px; font-weight:500; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }

  .stat-value { font-family:'Space Mono',monospace; font-size:36px; font-weight:700; line-height:1; margin-bottom:4px; }
  .stat-label { font-size:12px; color:var(--text-dim); }
  .stat-sub { font-size:11px; color:var(--text-muted); margin-top:6px; }
  .red{color:var(--accent-red)} .blue{color:var(--accent-blue)} .green{color:var(--accent-green)}

  .donut-wrap { display:flex; align-items:center; gap:16px; }
  .donut { width:90px; height:90px; flex-shrink:0; }
  .legend { display:flex; flex-direction:column; gap:8px; flex:1; }
  .legend-item { display:flex; align-items:center; gap:8px; font-size:12px; }
  .legend-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .legend-pct { font-family:'Space Mono',monospace; font-size:11px; color:var(--text-muted); margin-left:auto; }

  .bar-list { display:flex; flex-direction:column; gap:10px; }
  .bar-item { display:flex; flex-direction:column; gap:4px; }
  .bar-label { font-size:11px; color:var(--text-dim); display:flex; justify-content:space-between; }
  .bar-label span { font-family:'Space Mono',monospace; font-size:10px; }
  .bar-track { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:3px; transition:width 1.2s cubic-bezier(.16,1,.3,1); }

  .chips { display:flex; flex-wrap:wrap; gap:6px; }
  .chip { padding:4px 10px; border-radius:20px; font-weight:500; border:1px solid; white-space:nowrap; }
  .chip-red  { background:rgba(255,69,96,.1);  border-color:rgba(255,69,96,.3);  color:var(--accent-red);  }
  .chip-blue { background:rgba(59,130,246,.1); border-color:rgba(59,130,246,.3); color:var(--accent-blue); }

  .feedback-list { display:flex; flex-direction:column; gap:8px; }
  .feedback-item { padding:10px 12px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); font-size:12px; line-height:1.5; color:var(--text-dim); display:flex; gap:8px; align-items:flex-start; }
  .feedback-badge { font-size:9px; font-weight:700; padding:2px 7px; border-radius:4px; flex-shrink:0; margin-top:1px; text-transform:uppercase; letter-spacing:.5px; }
  .badge-bug     { background:rgba(255,69,96,.2);  color:var(--accent-red);  }
  .badge-opinion { background:rgba(59,130,246,.2); color:var(--accent-blue); }

  .ring-wrap { display:flex; align-items:center; justify-content:center; gap:20px; flex-wrap:wrap; }
  .ring-item { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .ring-label { font-size:11px; color:var(--text-muted); text-align:center; }
  .ring-num { font-family:'Space Mono',monospace; font-size:13px; }
  svg.ring { transform:rotate(-90deg); }
  circle.track { fill:none; stroke:var(--border); stroke-width:5; }
  circle.prog  { fill:none; stroke-width:5; stroke-linecap:round; }

  .refresh-bar { display:flex; align-items:center; justify-content:space-between; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px 14px; margin-bottom:16px; font-size:11px; color:var(--text-muted); }
  .refresh-btn { background:var(--accent-blue); color:#fff; border:none; border-radius:6px; padding:5px 12px; font-size:11px; font-family:'Noto Sans KR',sans-serif; cursor:pointer; display:flex; align-items:center; gap:5px; transition:opacity .2s; }
  .refresh-btn:hover { opacity:.8; }
  .countdown { font-family:'Space Mono',monospace; color:var(--accent-green); }

  /* CSV 업로드 영역 */
  .upload-toggle { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
  .upload-toggle-btn { background:transparent; border:1px solid var(--border); color:var(--text-muted); border-radius:7px; padding:5px 12px; font-size:11px; font-family:'Noto Sans KR',sans-serif; cursor:pointer; transition:all .2s; }
  .upload-toggle-btn:hover { border-color:var(--accent-blue); color:var(--accent-blue); }
  .upload-area { display:none; border:2px dashed var(--accent-blue); border-radius:12px; padding:20px; text-align:center; background:rgba(59,130,246,.04); margin-bottom:12px; cursor:pointer; position:relative; transition:background .2s; }
  .upload-area.open { display:block; }
  .upload-area:hover, .upload-area.drag { background:rgba(59,130,246,.1); }
  .upload-area input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .upload-area-title { font-size:13px; font-weight:600; color:var(--accent-blue); margin-bottom:4px; }
  .upload-area-desc  { font-size:11px; color:var(--text-muted); }

  .insight-box { padding:12px 14px; background:rgba(139,92,246,.07); border:1px solid rgba(139,92,246,.2); border-radius:10px; margin-bottom:12px; font-size:12px; color:var(--text-dim); line-height:1.7; }
  .insight-title { font-size:10px; font-weight:700; color:var(--accent-purple); letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }

  .fade-in { animation:fadeUp .5s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .d1{animation-delay:.05s} .d2{animation-delay:.1s} .d3{animation-delay:.15s}
  .d4{animation-delay:.2s}  .d5{animation-delay:.25s}
</style>
</head>
<body>

<div id="stickyTop">

<div class="header">
  <div class="header-tag">📊 Internal QA Report</div>
  <h1>AS 사내테스트 피드백</h1>
  <div class="subtitle" id="dashSubtitle">아쿠아 서바이벌 — 전체 피드백 분석</div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px;">
    <div class="last-updated" id="lastUpdated">⬤ —</div>
    <div style="display:flex;gap:6px;align-items:center;">
      <a href="https://docs.google.com/spreadsheets/d/18eLbBzxSZo9a9gr_-wZ3eCsJWgyX7c7tHsXP7LjYVAU/htmlview#gid=0"
         target="_blank"
         style="display:flex;align-items:center;gap:5px;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#10b981;border-radius:7px;padding:4px 10px;font-size:11px;text-decoration:none;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        원본 시트
      </a>
      <a href="https://docs.google.com/spreadsheets/d/18eLbBzxSZo9a9gr_-wZ3eCsJWgyX7c7tHsXP7LjYVAU/export?format=csv&gid=0"
         target="_blank"
         style="display:flex;align-items:center;gap:5px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);color:#f59e0b;border-radius:7px;padding:4px 10px;font-size:11px;text-decoration:none;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        원본 시트 CSV ↓
      </a>

<!-- CSV 드롭존 -->
<div id="dropZone"
  style="border:2px dashed var(--border);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;position:relative;transition:all .2s;background:var(--surface2);">
  <input type="file" accept=".csv" id="csvInput" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent-blue)" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
  <div>
    <div style="font-size:11px;color:var(--accent-blue);font-weight:600;">CSV 파일을 여기에 드래그하거나 클릭해서 업로드</div>
    <div style="font-size:10px;color:var(--text-muted);margin-top:1px;">원본 시트 CSV ↓ 버튼으로 다운받은 파일을 바로 올려주세요</div>
  </div>
  <span id="dropStatus" style="font-size:11px;color:var(--text-muted);margin-left:auto;white-space:nowrap;"></span>
</div>

</div><!-- /stickyTop -->

<div class="insight-box fade-in d1">
  <div class="insight-title">📋 분석 요약</div>
  <div id="insightText"></div>
</div>

<div class="grid-2 fade-in d1">
  <div class="card">
    <div class="card-title">전체 피드백</div>
    <div class="stat-value blue" id="statTotal">—</div>
    <div class="stat-label">총 항목</div>
    <div class="stat-sub" id="statSub">—</div>
  </div>
  <div class="card">
    <div class="card-title">버그 / 의견</div>
    <div style="display:flex;gap:12px;align-items:flex-end;">
      <div>
        <div class="stat-value red" id="statBugs">—</div>
        <div class="stat-label">버그</div>
        <div class="stat-sub" id="statBugsSub" style="font-family:'Space Mono',monospace;"></div>
      </div>
      <div style="color:var(--border);font-size:24px;margin-bottom:20px;">/</div>
      <div>
        <div class="stat-value blue" id="statOpinions">—</div>
        <div class="stat-label">의견</div>
        <div class="stat-sub" id="statOpinionsSub" style="font-family:'Space Mono',monospace;"></div>
      </div>
    </div>
  </div>
</div>

<div class="card grid-1 fade-in d2">
  <div class="card-title">분류 비율</div>
  <div class="donut-wrap">
    <svg class="donut" viewBox="0 0 100 100" id="donutSvg"></svg>
    <div class="legend" id="donutLegend"></div>
  </div>
</div>

<div class="card grid-1 fade-in d2">
  <div class="card-title">카테고리별 피드백 수</div>
  <div class="bar-list" id="barList"></div>
</div>

<div class="card grid-1 fade-in d3">
  <div class="card-title">챕터별 버그 발생 현황</div>
  <div class="ring-wrap" id="ringWrap"></div>
</div>

<div class="card grid-1 fade-in d4">
  <div class="card-title">🔑 주요 키워드 (버그)</div>
  <div class="chips" id="bugChips"></div>
</div>
<div class="card grid-1 fade-in d4" style="margin-top:12px;">
  <div class="card-title">💡 주요 키워드 (의견)</div>
  <div class="chips" id="opinionChips"></div>
</div>

<div class="card grid-1 fade-in d5" style="margin-top:12px;">
  <div class="card-title">📋 주요 피드백 (버그 우선)</div>
  <div class="feedback-list" id="feedbackList"></div>
</div>

<script>
// ══════════════════════════════════════════════════
//  CSV 파서 (RFC 4180 준수)
// ══════════════════════════════════════════════════
function parseCSV(text) {
  const rows = [];
  let i = 0, n = text.length;
  while (i < n) {
    const row = [];
    while (i < n) {
      if (text[i] === '"') {
        let val = ''; i++;
        while (i < n) {
          if (text[i] === '"' && text[i+1] === '"') { val += '"'; i += 2; }
          else if (text[i] === '"') { i++; break; }
          else { val += text[i++]; }
        }
        row.push(val);
        if (text[i] === ',') i++;
        else break;
      } else {
        let val = '';
        while (i < n && text[i] !== ',' && text[i] !== '\n' && text[i] !== '\r') val += text[i++];
        row.push(val.trim());
        if (text[i] === ',') { i++; }
        else break;
      }
    }
    while (i < n && (text[i] === '\r' || text[i] === '\n')) i++;
    if (row.some(c => c)) rows.push(row);
  }
  return rows;
}

// ══════════════════════════════════════════════════
//  데이터 분석 엔진 (순수 JS)
// ══════════════════════════════════════════════════
function analyze(csvText) {
  const rows = parseCSV(csvText);
  if (rows.length < 2) return null;

  // 헤더 컬럼 인덱스 자동 탐지
  const header = rows[0].map(h => h.trim());
  const typeIdx    = header.findIndex(h => /분류|유형|type/i.test(h));
  const contentIdx = header.findIndex(h => /의견|내용|피드백|content/i.test(h));
  if (typeIdx < 0 || contentIdx < 0) return null;

  const bugs = [], opinions = [];
  let rawBugs = 0, rawOpinions = 0; // Ex) 샘플행 포함 원본 전체 건수
  for (let r = 1; r < rows.length; r++) {
    const row = rows[r];
    const typ     = (row[typeIdx]    || '').trim();
    const content = (row[contentIdx] || '').trim();
    if (typ === '버그')   rawBugs++;
    if (typ === '의견')   rawOpinions++;
    if (!content || content.startsWith('Ex)')) continue;
    if (typ === '버그')  bugs.push(content);
    if (typ === '의견')  opinions.push(content);
  }

  const total = bugs.length + opinions.length;

  // ── 카테고리 분류 ─────────────────────────────
  const catRules = [
    { label:'튜토리얼/챕터 진행', color:'#ff4560', bugs:true,
      re:/튜토리얼|챕터|chapter|1챕|2챕|3챕|4챕|5챕|7챕|9챕|하이라이트|말풍선|데스티나|NPC 대사|대사 반복|연출/ },
    { label:'UI/UX',             color:'#3b82f6', bugs:true,
      re:/UI|UX|버튼|이미지|미씽|HUD|팝업|말풍선|아이콘|화면|직관|바로가기|줌인|줌아웃|토스트|알림|캐시샵/ },
    { label:'게임플레이/밸런스',  color:'#f59e0b', bugs:false,
      re:/훈련|건설|미션|시간|가속|전투|병력|허들|텀|동기|지루|반복|전개|빠르|느리|길어|밸런스|자동 완료|봇|아레나/ },
    { label:'NPC/대화 시스템',    color:'#8b5cf6', bugs:true,
      re:/NPC|대화|대사|메세지|박스|잘리|반복|텍스트|말풍선|카일라|여왕|타이탄 관련 멘트/ },
    { label:'소환/전투 시스템',   color:'#10b981', bugs:true,
      re:/소환|버퍼링|전투|캐릭터|이동|부자연|부대|출정|복귀|관문|집결|행군/ },
    { label:'연맹/소셜',          color:'#06b6d4', bugs:true,
      re:/연맹|길드|채팅|소셜|서신|가입|집결/ },
    { label:'영지/건설',          color:'#ec4899', bugs:false,
      re:/영지|건물|건설|분수대|농장|성 2|레벨업|타이탄|격납고/ },
  ];

  const catCounts = catRules.map(() => 0);
  const allItems = [
    ...bugs.map(t => ({ type:'bug', text:t })),
    ...opinions.map(t => ({ type:'opinion', text:t })),
  ];
  allItems.forEach(item => {
    for (let i = 0; i < catRules.length; i++) {
      if (catRules[i].re.test(item.text)) { catCounts[i]++; break; }
    }
  });
  const categories = catRules
    .map((r, i) => ({ label:r.label, count:catCounts[i], color:r.color }))
    .filter(c => c.count > 0)
    .sort((a, b) => b.count - a.count);

  // ── 챕터별 버그 ──────────────────────────────
  const chapterMap = { '1챕터':0,'2챕터':0,'3챕터':0,'4챕터':0,'7챕터':0,'9챕터':0,'기타':0 };
  const chColors   = { '1챕터':'#ff4560','2챕터':'#f97316','3챕터':'#f59e0b','4챕터':'#8b5cf6','7챕터':'#3b82f6','9챕터':'#10b981','기타':'#64748b' };
  bugs.forEach(b => {
    if (/1챕|1 챕/.test(b))      chapterMap['1챕터']++;
    else if (/2챕|2 챕/.test(b)) chapterMap['2챕터']++;
    else if (/3챕|3 챕/.test(b)) chapterMap['3챕터']++;
    else if (/4챕|4 챕/.test(b)) chapterMap['4챕터']++;
    else if (/7챕|7 챕/.test(b)) chapterMap['7챕터']++;
    else if (/9챕|9 챕/.test(b)) chapterMap['9챕터']++;
    else                           chapterMap['기타']++;
  });
  const chapterBugs = Object.entries(chapterMap)
    .filter(([,v]) => v > 0)
    .map(([k, v]) => ({ label:k, count:v, color:chColors[k] }));

  // ── 키워드 추출 ──────────────────────────────
  const bugKeyDefs = [
    { text:'튜토리얼 오류',  re:/튜토리얼/,           items:bugs },
    { text:'NPC 대사 반복',  re:/NPC|대사.*반복|반복.*대사/, items:bugs },
    { text:'말풍선',          re:/말풍선/,              items:bugs },
    { text:'검은 화면',       re:/검은 화면/,           items:bugs },
    { text:'UI 이미지 미씽', re:/이미지 미씽|미씽/,    items:bugs },
    { text:'HUD 미사라짐',   re:/HUD/,                 items:bugs },
    { text:'소환 버퍼링',    re:/버퍼링/,              items:bugs },
    { text:'연맹 이동 오류', re:/연맹.*부대|부대.*산|복귀를 못/, items:bugs },
    { text:'길드 버튼 오표시',re:/길드.*버튼|길드 도움/, items:bugs },
    { text:'농장 임무 오류', re:/농장/,                items:bugs },
    { text:'비 이펙트',      re:/비 이펙트/,           items:bugs },
    { text:'타이탄 오표시',  re:/타이탄/,              items:bugs },
    { text:'채팅 오류',      re:/채팅/,               items:bugs },
    { text:'캐시샵 알림',    re:/캐시샵/,              items:bugs },
  ];
  const opnKeyDefs = [
    { text:'튜토리얼 개선',       re:/튜토리얼/,       items:opinions },
    { text:'건설/훈련 시간 단축', re:/훈련.*시간|건설.*시간|시간.*길|가속/,  items:opinions },
    { text:'전투 콘텐츠 조기 해금',re:/전투|채집.*초반|초반.*다양/, items:opinions },
    { text:'UI 직관성',           re:/직관|버튼.*색|UI/, items:opinions },
    { text:'동기부여 부족',       re:/동기부여|왜 해야|뭘 해야|반복/, items:opinions },
    { text:'자동 완료',           re:/자동 완료|자동.*자원|오프라인/, items:opinions },
    { text:'가속권 개선',         re:/가속권/,         items:opinions },
    { text:'영웅 레벨업 일괄',    re:/일괄.*업|레벨업.*일괄|영웅 레벨/, items:opinions },
    { text:'채팅 조기 오픈',      re:/채팅창/,         items:opinions },
    { text:'화풍 통일',           re:/화풍/,           items:opinions },
    { text:'닉네임 무료 변경',    re:/닉네임/,         items:opinions },
    { text:'파티 슬롯 설정',      re:/파티/,           items:opinions },
    { text:'집결 자동화',         re:/집결/,           items:opinions },
    { text:'바로가기 메뉴',       re:/바로가기/,       items:opinions },
  ];

  function calcKeywords(defs) {
    return defs.map(d => ({ text:d.text, w: d.items.filter(t => d.re.test(t)).length }))
      .filter(k => k.w > 0)
      .sort((a,b) => b.w - a.w)
      .slice(0, 12);
  }
  const bugKeywords = calcKeywords(bugKeyDefs);
  const opnKeywords = calcKeywords(opnKeyDefs);

  // ── 주요 피드백 ──────────────────────────────
  const topFeedback = [
    ...bugs.slice(0, 7).map(t => ({ type:'bug',     text: t.replace(/\[현재\]|\[수정\]|\[이슈\]/g,'').replace(/\n+/g,' ').trim().slice(0,120) })),
    ...opinions.slice(0, 5).map(t => ({ type:'opinion', text: t.replace(/\n+/g,' ').trim().slice(0,120) })),
  ].slice(0, 12);

  // ── 인사이트 ─────────────────────────────────
  const insight = `총 ${total}건 중 버그 ${bugs.length}건(${(bugs.length/total*100).toFixed(0)}%), 의견 ${opinions.length}건(${(opinions.length/total*100).toFixed(0)}%)으로 집계됐습니다. `
    + `가장 빈번한 버그는 튜토리얼·NPC 대화 시스템(4챕터 집중)이며, 의견에서는 초반 콘텐츠 지루함·건설/훈련 시간 단축·동기부여 부족이 반복적으로 제기됐습니다.`;

  return { total, bugs: bugs.length, opinions: opinions.length, rawBugs, rawOpinions, insight, categories, chapterBugs, bugKeywords, opinionKeywords: opnKeywords, topFeedback };
}

//  렌더링
// ══════════════════════════════════════════════════
function render(D) {
  document.getElementById('statTotal').textContent    = D.total;
  document.getElementById('statBugs').textContent     = D.bugs;
  document.getElementById('statOpinions').textContent = D.opinions;
  document.getElementById('statSub').textContent      = `버그 ${(D.bugs/D.total*100).toFixed(1)}%  ·  의견 ${(D.opinions/D.total*100).toFixed(1)}%`;
  document.getElementById('insightText').textContent  = D.insight;

  // 원본 → 추려진 건수
  document.getElementById('statBugsSub').textContent     = D.rawBugs > D.bugs     ? `원본 ${D.rawBugs}건 중` : '';
  document.getElementById('statOpinionsSub').textContent = D.rawOpinions > D.opinions ? `원본 ${D.rawOpinions}건 중` : '';

  // Donut
  const circ = 2*Math.PI*38;
  const bp = D.bugs/D.total, op = D.opinions/D.total;
  document.getElementById('donutSvg').innerHTML = `
    <circle fill="none" cx="50" cy="50" r="38" stroke="#252a3a" stroke-width="10"/>
    <circle fill="none" cx="50" cy="50" r="38" stroke="#ff4560" stroke-width="10" stroke-linecap="round"
      stroke-dasharray="${(bp*circ).toFixed(1)} ${circ.toFixed(1)}" stroke-dashoffset="0"/>
    <circle fill="none" cx="50" cy="50" r="38" stroke="#3b82f6" stroke-width="10" stroke-linecap="round"
      stroke-dasharray="${(op*circ).toFixed(1)} ${circ.toFixed(1)}" stroke-dashoffset="-${(bp*circ).toFixed(1)}"/>
    <text x="50" y="46" text-anchor="middle" fill="#e2e8f0" font-size="13" font-family="Space Mono" dominant-baseline="middle">${D.total}</text>
    <text x="50" y="60" text-anchor="middle" fill="#64748b" font-size="7" font-family="Noto Sans KR" dominant-baseline="middle">전체</text>`;
  document.getElementById('donutLegend').innerHTML = `
    <div class="legend-item"><div class="legend-dot" style="background:#ff4560"></div><span style="font-size:12px;">버그 리포트</span><span class="legend-pct">${(bp*100).toFixed(1)}%</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div><span style="font-size:12px;">개선 의견</span><span class="legend-pct">${(op*100).toFixed(1)}%</span></div>`;

  // Bar
  const mx = Math.max(...D.categories.map(c=>c.count),1);
  document.getElementById('barList').innerHTML = D.categories.map(c=>`
    <div class="bar-item">
      <div class="bar-label"><span style="color:${c.color}">${c.label}</span><span style="color:${c.color}">${c.count}건</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:0%;background:${c.color}" data-w="${(c.count/mx*100).toFixed(0)}"></div></div>
    </div>`).join('');
  // animate bars after paint
  requestAnimationFrame(() => {
    document.querySelectorAll('.bar-fill').forEach(el => el.style.width = el.dataset.w + '%');
  });

  // Rings
  const maxC = Math.max(...D.chapterBugs.map(c=>c.count),1);
  document.getElementById('ringWrap').innerHTML = D.chapterBugs.map(c=>{
    const r=22, cir=2*Math.PI*r, d=(c.count/maxC)*cir;
    return `<div class="ring-item">
      <svg class="ring" width="60" height="60" viewBox="0 0 60 60">
        <circle class="track" cx="30" cy="30" r="${r}"/>
        <circle class="prog" cx="30" cy="30" r="${r}" stroke="${c.color}"
          stroke-dasharray="${d.toFixed(1)} ${cir.toFixed(1)}" stroke-dashoffset="0"/>
      </svg>
      <div class="ring-num" style="color:${c.color}">${c.count}</div>
      <div class="ring-label">${c.label}</div>
    </div>`;
  }).join('');

  // Keywords
  document.getElementById('bugChips').innerHTML = D.bugKeywords.map(k=>
    `<span class="chip chip-red" style="font-size:${9+Math.min(k.w,6)}px">${k.text} <b>${k.w}</b></span>`).join('');
  document.getElementById('opinionChips').innerHTML = D.opinionKeywords.map(k=>
    `<span class="chip chip-blue" style="font-size:${9+Math.min(k.w,6)}px">${k.text} <b>${k.w}</b></span>`).join('');

  // Feedback
  document.getElementById('feedbackList').innerHTML = D.topFeedback.map(f=>`
    <div class="feedback-item">
      <span class="feedback-badge ${f.type==='bug'?'badge-bug':'badge-opinion'}">${f.type==='bug'?'버그':'의견'}</span>
      <span>${f.text}</span>
    </div>`).join('');

  // Timestamp
  const now = new Date();
  document.getElementById('lastUpdated').textContent =
    `⬤ 마지막 업데이트: ${now.toLocaleDateString('ko-KR')} ${now.toLocaleTimeString('ko-KR')}`;
}

// ══════════════════════════════════════════════════
//  CSV 드롭존 핸들러
// ══════════════════════════════════════════════════
let currentData = null;

const dropZone = document.getElementById('dropZone');
const csvInput = document.getElementById('csvInput');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = 'var(--accent-blue)'; dropZone.style.background = 'rgba(59,130,246,.08)'; });
dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = 'var(--border)'; dropZone.style.background = 'var(--surface)'; });
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.style.borderColor = 'var(--border)';
  dropZone.style.background = 'var(--surface)';
  const file = e.dataTransfer.files[0];
  if (file) loadCSV(file);
});
csvInput.addEventListener('change', e => {
  if (e.target.files[0]) loadCSV(e.target.files[0]);
});

function loadCSV(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const result = analyze(e.target.result);
    if (result) {
      currentData = result;
      document.getElementById('dropStatus').textContent = `✓ ${file.name} (${result.total}건)`;
      document.getElementById('dropStatus').style.color = 'var(--accent-green)';
      document.getElementById('dashSubtitle').textContent = '아쿠아 서바이벌 — ' + file.name.replace('.csv','');
      render(result);
    } else {
      document.getElementById('dropStatus').textContent = '⚠ 분류/의견 컬럼을 찾을 수 없습니다';
      document.getElementById('dropStatus').style.color = 'var(--accent-yellow)';
    }
  };
  reader.readAsText(file, 'UTF-8');
}
